<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutriverse — Redefining</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #F6F4EF;
      color: #1B1B1B;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .wrapper {
      max-width: 800px;
      padding: 40px 20px;
    }

    .logo {
      height: 36px;
      margin-bottom: 60px;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 64px;
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 24px;
    }

    p {
      font-size: 20px;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .email {
      font-weight: 600;
      color: #136A37;
      text-decoration: none;
      font-size: 18px;
      border-bottom: 2px solid #136A37;
      padding-bottom: 4px;
      transition: 0.3s ease;
    }

    .email:hover {
      opacity: 0.7;
    }

    /* subtle animated background */
    .bg-text {
      position: absolute;
      font-size: 120px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      color: rgba(19,106,55,0.04);
      white-space: nowrap;
      animation: scroll 20s linear infinite;
    }

    @keyframes scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* mobile */
    @media (max-width: 768px) {
      h1 {
        font-size: 36px;
      }

      p {
        font-size: 16px;
      }

      .bg-text {
        font-size: 48px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-text">
    REDEFINING • REBUILDING • REIMAGINING •
  </div>

  <div class="wrapper">
    <img src="assets/logo.png" alt="Nutriverse" class="logo">

    <h1>
      We’re Redefining Nutriverse.
    </h1>

    <p>
      The crunch is evolving.  
      A sharper, bolder experience is on its way.
    </p>

    <a href="mailto:contact@thenutriverse.in" class="email">
      contact@thenutriverse.in
    </a>
  </div>

</body>
</html>
